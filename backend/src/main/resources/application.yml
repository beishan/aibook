server:
  port: 8080

spring:
  main:
    allow-circular-references: true
  application:
    name: aibook-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aibook}
    username: ${SPRING_DATASOURCE_USERNAME:aibook}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:memoryvault}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  cache:
    type: redis

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:memoryvault}

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production}
  expiration: 86400000  # 24 hours

# MinIO Configuration
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:${MINIO_USER:minioadmin}}
  secret-key: ${MINIO_SECRET_KEY:${MINIO_PASSWORD:memoryvault}}
  bucket-name: aibook

# Upload configuration
upload:
  path: ${UPLOAD_PATH:/app/uploads}

# Book scanning configuration
scanning:
  enabled: true
  cron: "0 0 2 * * ?"  # 每天凌晨2点
  directories: /books/fiction,/books/tech

logging:
  level:
    com.aibook: DEBUG
    org.springframework.security: DEBUG
