services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: aibook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aibook
      POSTGRES_USER: aibook
      POSTGRES_PASSWORD: ${DB_PASSWORD:-memoryvault}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aibook"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aibook-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: aibook-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-memoryvault}
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-memoryvault}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aibook-network

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: aibook-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-memoryvault}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aibook-network

  # 后端服务
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: aibook-backend
    restart: unless-stopped
    environment:
      # 数据库配置
      DB_PASSWORD: ${DB_PASSWORD:-memoryvault}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aibook
      SPRING_DATASOURCE_USERNAME: aibook
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-memoryvault}

      # JWT 配置
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}

      # MinIO 配置
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-memoryvault}

      # JVM 参数
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - aibook-network

  # 前端服务
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: aibook-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - aibook-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  uploads_data:

networks:
  aibook-network:
    driver: bridge
